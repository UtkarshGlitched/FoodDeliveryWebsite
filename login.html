<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In — Foodie's Home</title>
    <link rel="stylesheet" href="css/auth.css">
  </head>
  <body>
    <main class="auth-root">
      <div class="auth-card">
        <div class="auth-visual">
          <div class="overlay">
            <div class="caption">
              <h3>Delicious meals delivered</h3>
              <p class="small">Fast delivery • Best restaurants • Real-time tracking</p>
            </div>
          </div>
        </div>
        <div class="auth-form">
          <h1>Sign in to Foodie's Home</h1>
          <p class="small">Welcome back — order your favorite dishes.</p>
          <div class="social-row">
            <div id="google-login-container" style="flex:1"></div>
            <!-- fallback button for browsers without Google Identity or if no CLIENT_ID set -->
            <button type="button" id="google-login" class="social-btn google" style="display:none">
              <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M12 11.5v2.9h7.2c-.3 1.7-1.6 4-4.3 5.3l-0.1.1-3.2-.1c-3.4 0-6.2-2.8-6.2-6.3 0-3.5 2.8-6.3 6.2-6.3 2.1 0 3.6.9 4.4 1.7l1.9-1.9C17.5 3.6 14.9 2.5 12 2.5 7 2.5 3.2 6.3 3.2 11.3S7 20 12 20c3.1 0 5.4-1.1 6.9-2.7L12 11.5z"/></svg>
              Continue with Google
            </button>
          </div>
          <form id="login-form" novalidate>
            <div id="mode-title"><h2 style="display:none">Sign in</h2></div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>

            <div class="row">
              <label class="checkbox"><input type="checkbox" id="remember"> Remember me</label>
              <a class="forgot" href="#">Forgot?</a>
            </div>

            <div id="error" class="error" aria-live="polite"></div>

            <button type="submit" class="btn" id="submit-btn">Sign in</button>
          </form>

          <div class="alt" id="alt-text">New here? <a href="register.html">Create an account</a></div>
        </div>
      </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/google-auth.js"></script>
    <script>
      // initialize Google Identity once the GIS script loads
      window.addEventListener('load', ()=>{
        const inited = window.initGoogleSignIn && window.initGoogleSignIn();
        if(!inited){
          // show fallback demo button if no CLIENT_ID provided
          const fallback = document.getElementById('google-login'); if(fallback) fallback.style.display='inline-flex';
        } else {
          // hide fallback if inited
          const fallback = document.getElementById('google-login'); if(fallback) fallback.style.display='none';
        }
      });
    </script>
    <script src="js/auth.js"></script>
  </body>
</html>
