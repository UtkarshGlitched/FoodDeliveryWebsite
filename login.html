<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In — Foodie's Home</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="auth-root">
      <div class="auth-card">
        <div class="auth-visual">
          <div class="overlay">
            <h3>🍛 Delicious Indian Food</h3>
            <p>Order your favorite dishes from the best restaurants</p>
            <div class="feature">Free delivery on orders above ₹299</div>
            <div class="feature">Fast delivery within 30 mins</div>
            <div class="feature">Best prices guaranteed</div>
          </div>
        </div>
        <div class="auth-form">
          <h1>Welcome Back! 👋</h1>
          <p class="subtitle">Sign in to continue ordering your favorite food</p>
          <div class="social-row">
            <div id="google-login-container" style="flex:1"></div>
            <button type="button" id="google-login" class="social-btn google" style="display:none">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M12 11.5v2.9h7.2c-.3 1.7-1.6 4-4.3 5.3l-0.1.1-3.2-.1c-3.4 0-6.2-2.8-6.2-6.3 0-3.5 2.8-6.3 6.2-6.3 2.1 0 3.6.9 4.4 1.7l1.9-1.9C17.5 3.6 14.9 2.5 12 2.5 7 2.5 3.2 6.3 3.2 11.3S7 20 12 20c3.1 0 5.4-1.1 6.9-2.7L12 11.5z"/></svg>
              Continue with Google
            </button>
          </div>
          
          <div class="login-toggle">
            <button type="button" class="toggle-btn active" data-type="phone">📱 Phone</button>
            <button type="button" class="toggle-btn" data-type="email">📧 Email</button>
          </div>
          
          <form id="login-form" novalidate>
            <div id="phone-input-group">
              <label for="phone">📱 Phone Number</label>
              <div class="phone-group">
                <select id="country-code">
                  <option value="+1">+1</option>
                  <option value="+44">+44</option>
                  <option value="+91" selected>+91</option>
                </select>
                <input id="phone" name="phone" type="tel" placeholder="9876543210">
              </div>
            </div>
            
            <div id="email-input-group" style="display:none">
              <label for="email">📧 Email Address</label>
              <input id="email" name="email" type="email" placeholder="you@example.com">
            </div>

            <label for="password">🔐 Password</label>
            <div style="position:relative">
              <input id="password" name="password" type="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-pass" id="toggle-password">Show</button>
            </div>

            <div class="row">
              <label class="checkbox"><input type="checkbox" id="remember"> Remember me</label>
              <a class="forgot" href="#">Forgot Password?</a>
            </div>

            <div id="error" class="error" aria-live="polite"></div>

            <button type="submit" class="btn" id="submit-btn">🚀 Sign In</button>
          </form>

          <div class="alt" id="alt-text">New here? <a href="register.html">Create an account</a></div>
        </div>
      </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/google-auth.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
