<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Foodie's Home - Best Indian Food Delivery</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <h1 class="logo"><a href="index.html">Foodie's<span>Home</span></a></h1>
        <div class="location">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7z" stroke="#ff6b01" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="location-input" placeholder="Enter delivery location" aria-label="Delivery location">
        </div>
      </div>
      <div class="search">
        <input id="search-input" placeholder="Search for dishes, cuisines..." aria-label="Search products">
        <select id="category-filter">
          <option value="all">All Categories</option>
        </select>
      </div>
      <div class="actions">
        <div id="auth-area" class="auth-area"></div>
        <button id="cart-btn" aria-label="Open cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
          Cart (<span id="cart-count">0</span>)
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <h2>🍛 Delicious Indian Food Delivered Fresh</h2>
        <p>Order your favorite dishes from the best restaurants in town</p>
      </section>

      <section id="products" class="products-grid"></section>
    </main>

    <aside id="cart" class="cart">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <button id="close-cart">×</button>
      </div>
      <ul id="cart-items" class="cart-items"></ul>
      <div class="cart-footer">
        <div class="cart-total">Total: <span>₹<span id="cart-total">0</span></span></div>
        <button id="checkout">Proceed to Checkout</button>
      </div>
    </aside>

    <div id="product-modal" class="modal" aria-hidden="true">
      <div class="modal-body">
        <button id="modal-close" class="modal-close">×</button>
        <div class="modal-content">
          <img id="modal-img" src="" alt="">
          <div class="modal-info">
            <h3 id="modal-title"></h3>
            <p class="rating">★ <span id="modal-rating"></span> • <span id="modal-time"></span> mins</p>
            <p class="desc" id="modal-desc"></p>
            <p class="delivery-time">🏠 Delivery in <span id="modal-time2"></span> mins</p>
            <div class="modal-actions">
              <div class="price">₹<span id="modal-price">0</span></div>
              <button id="modal-add">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
